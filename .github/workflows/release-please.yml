name: Release Please

on:
  push:
    branches: ["main"]

# Least privilege: release-please only needs to open Release PRs and push tags.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # release-please-action@v5: only breaking change vs v4 is the node24 runtime
      # bump; the `with:` inputs (token-only here) are unchanged.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-hex:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"
      # Publishing ships the working tree at run time, not the last commit. Fail
      # on any uncommitted file so .planning/, local secrets, or stray artifacts
      # never leak into the tarball.
      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is dirty; refusing to publish." >&2
            git status --porcelain >&2
            exit 1
          fi
      - run: mix deps.get
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
# NOTE (GITHUB_TOKEN limitation): the Release PR is created with GITHUB_TOKEN, so
# pushes to it do NOT trigger the host-contract-proof workflow. Manually confirm
# CI is green on `main` before merging the Release PR.
