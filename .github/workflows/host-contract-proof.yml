  continuity-proof-status:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - continuity-ver04-c1
      - continuity-ver04-c2
      - continuity-ver04-c3
      - continuity-ver04-c4
    steps:
      - name: Download continuity evidence from all claim jobs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: tmp/ver04/inbox
      - name: Compose deterministic claim matrix outputs
        run: |
          set -euo pipefail
          mkdir -p tmp/ver04/claims tmp/ver04/logs
          shopt -s globstar nullglob
          C1_CLAIM=(tmp/ver04/inbox/continuity-ver04-c1-evidence/**/VER04-C1.json)
          C2_CLAIM=(tmp/ver04/inbox/continuity-ver04-c2-evidence/**/VER04-C2.json)
          C3_CLAIM=(tmp/ver04/inbox/continuity-ver04-c3-evidence/**/VER04-C3.json)
          C4_CLAIM=(tmp/ver04/inbox/continuity-ver04-c4-evidence/**/VER04-C4.json)
          C1_LOG=(tmp/ver04/inbox/continuity-ver04-c1-evidence/**/VER04-C1.log)
          C2_LOG=(tmp/ver04/inbox/continuity-ver04-c2-evidence/**/VER04-C2.log)
          C3_LOG=(tmp/ver04/inbox/continuity-ver04-c3-evidence/**/VER04-C3.log)
          C4_LOG=(tmp/ver04/inbox/continuity-ver04-c4-evidence/**/VER04-C4.log)
          cp "${C1_CLAIM[0]}" tmp/ver04/claims/VER04-C1.json
          cp "${C2_CLAIM[0]}" tmp/ver04/claims/VER04-C2.json
          cp "${C3_CLAIM[0]}" tmp/ver04/claims/VER04-C3.json
          cp "${C4_CLAIM[0]}" tmp/ver04/claims/VER04-C4.json
          cp "${C1_LOG[0]}" tmp/ver04/logs/VER04-C1.log
          cp "${C2_LOG[0]}" tmp/ver04/logs/VER04-C2.log
          cp "${C3_LOG[0]}" tmp/ver04/logs/VER04-C3.log
          cp "${C4_LOG[0]}" tmp/ver04/logs/VER04-C4.log
          cat <<EOF > "tmp/ver04/run-metadata.json"
          {
            "github.run_id": "${{ github.run_id }}",
            "github.sha": "${{ github.sha }}",
            "workflow_file": ".github/workflows/host-contract-proof.yml",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "seed_policy": "deterministic --seed 0"
          }
          EOF
          python3 - <<'PY'
          import json
          from pathlib import Path
          claims_dir = Path("tmp/ver04/claims")
          claim_files = sorted(claims_dir.glob("VER04-C*.json"))
          if not claim_files:
              raise SystemExit("No claim files were found for matrix composition.")
          claims = [json.loads(path.read_text(encoding="utf-8")) for path in claim_files]
          claims = sorted(claims, key=lambda claim: claim["claim_id"])
          matrix = {
              "claims": claims,
              "total_claims": len(claims),
              "successful_claims": sum(1 for claim in claims if claim["status"] == "success"),
              "failed_claims": sum(1 for claim in claims if claim["status"] != "success"),
          }
          Path("tmp/ver04/ver04-claim-matrix.json").write_text(
              json.dumps(matrix, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          lines = [
              "# VER-04 Claim Matrix",
              "",
              "| Claim ID | Job | Status | Seed | Command |",
              "|---|---|---|---|---|",
          ]
          for claim in claims:
              lines.append(
                  f"| {claim['claim_id']} | {claim['job']} | {claim['status']} | {claim['seed']} | `{claim['command']}` |"
              )
          lines.extend(
              [
                  "",
                  f"- Total claims: {matrix['total_claims']}",
                  f"- Successful claims: {matrix['successful_claims']}",
                  f"- Failed claims: {matrix['failed_claims']}",
              ]
          )
          Path("tmp/ver04/ver04-claim-matrix.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Compose Phase 40 gate report
        id: phase40_gate_report
        run: |
          set -euo pipefail
          mkdir -p tmp/ver04
          C3_RESULT="${{ needs.continuity-ver04-c3.result }}"
          C4_RESULT="${{ needs.continuity-ver04-c4.result }}"
          if [ "${C3_RESULT}" = "success" ] && [ "${C4_RESULT}" = "success" ]; then
            GATE_STATUS="pass"
          else
            GATE_STATUS="fail"
          fi
          cat <<EOF > tmp/ver04/phase40-gate-report.json
          {
            "coverage_scope": "phase40",
            "checked_claims": ["VER04-C3", "VER04-C4"],
            "required_markers": [
              "ownership-triad",
              "runbook-ordering",
              "overview-continuity",
              "copy-contract",
              "visual-hierarchy"
            ],
            "claim_results": {
              "VER04-C3": "${C3_RESULT}",
              "VER04-C4": "${C4_RESULT}"
            },
            "status": "${GATE_STATUS}",
            "github.run_id": "${{ github.run_id }}",
            "github.sha": "${{ github.sha }}",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
      - name: Scan proof packet for unsafe content
        id: redaction_scan
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path
          root = Path("tmp/ver04")
          scan_targets = sorted(path for path in root.rglob("*") if path.is_file())
          patterns = {
              "aws_access_key": r"AKIA[0-9A-Z]{16}",
              "github_token": r"ghp_[A-Za-z0-9]{36}",
              "private_key": r"-----BEGIN (?:RSA|EC|OPENSSH|PRIVATE) KEY-----",
              "db_password_url": r"postgres(?:ql)?://[^\\s:@]+:[^\\s@]+@",
          }
          unsafe_matches = []
          for path in scan_targets:
              content = path.read_text(encoding="utf-8", errors="ignore")
              for label, pattern in patterns.items():
                  if re.search(pattern, content):
                      unsafe_matches.append({"file": str(path), "pattern": label})
          report = {
              "status": "safe" if not unsafe_matches else "unsafe",
              "scan_root": str(root),
              "scanned_files": [str(path) for path in scan_targets],
              "unsafe_matches": unsafe_matches,
          }
          report_path = root / "redaction-report.json"
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          if unsafe_matches:
              raise SystemExit(1)
          PY
      - name: Upload continuity proof packet
        id: upload_proof_packet
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: continuity-proof-packet
          if-no-files-found: error
          path: |
            tmp/ver04/ver04-claim-matrix.md
            tmp/ver04/ver04-claim-matrix.json
            tmp/ver04/run-metadata.json
            tmp/ver04/redaction-report.json
            tmp/ver04/phase40-gate-report.json
            tmp/ver04/logs/*.log
      - name: Upload Phase 40 gate report
        id: upload_phase40_gate_report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase40-gate-report
          if-no-files-found: error
          path: tmp/ver04/phase40-gate-report.json
      - name: Enforce continuity proof failure boundaries
        if: always()
        run: |
          if [ "${{ needs.continuity-ver04-c1.result }}" != "success" ] || \
             [ "${{ needs.continuity-ver04-c2.result }}" != "success" ] || \
             [ "${{ needs.continuity-ver04-c3.result }}" != "success" ] || \
             [ "${{ needs.continuity-ver04-c4.result }}" != "success" ]; then
            echo "One or more continuity proof lanes did not succeed."
            exit 1
          fi
          if [ "${{ steps.redaction_scan.outcome }}" != "success" ]; then
            echo "Redaction scan failed or reported unsafe artifact content."
            exit 1
          fi
          if [ "${{ steps.upload_proof_packet.outcome }}" != "success" ]; then
            echo "Proof packet upload failed or required files were missing."
            exit 1
          fi

  host-contract-gate:
    name: host-contract-gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - structural
      - fresh-host
      - docs-contract
      - native-first
      - doctor
      - first-session
      - optional-bridge
      - control-plane
      - upgrade-proof
      - workflow-compatibility
      - continuity-proof-status
    steps:
      - name: Verify required host-contract lanes
        env:
          STRUCTURAL: ${{ needs.structural.result }}
          FRESH_HOST: ${{ needs.fresh-host.result }}
          DOCS_CONTRACT: ${{ needs.docs-contract.result }}
          NATIVE_FIRST: ${{ needs.native-first.result }}
          DOCTOR: ${{ needs.doctor.result }}
          FIRST_SESSION: ${{ needs.first-session.result }}
          OPTIONAL_BRIDGE: ${{ needs.optional-bridge.result }}
          CONTROL_PLANE: ${{ needs.control-plane.result }}
          UPGRADE_PROOF: ${{ needs.upgrade-proof.result }}
          WORKFLOW_COMPATIBILITY: ${{ needs.workflow-compatibility.result }}
          CONTINUITY_PROOF_STATUS: ${{ needs.continuity-proof-status.result }}
        run: |
          set -euo pipefail
          failed=0
          for lane in STRUCTURAL FRESH_HOST DOCS_CONTRACT NATIVE_FIRST DOCTOR FIRST_SESSION \
                      OPTIONAL_BRIDGE CONTROL_PLANE UPGRADE_PROOF WORKFLOW_COMPATIBILITY \
                      CONTINUITY_PROOF_STATUS; do
            result="${!lane}"
            if [[ "$result" != "success" ]]; then
              echo "Required host-contract lane $lane: $result"
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "host-contract-gate failed: one or more lanes did not succeed."
            exit 1
          fi
          echo "host-contract-gate passed: all host-contract lanes succeeded."
