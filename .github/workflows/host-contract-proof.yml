      - run: mix test test/oban_powertools/workflow_runtime_transitions_test.exs test/oban_powertools/workflow_runtime_signals_test.exs test/oban_powertools/workflow_runtime_commands_test.exs test/oban_powertools/workflow_callbacks_test.exs test/oban_powertools/workflow_compatibility_test.exs

  continuity-ver04-c1:
    runs-on: ubuntu-latest
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oban_powertools_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"
      - run: mix deps.get
      - name: Run VER04-C1 suite and emit claim evidence
        run: |
          set +e
          CLAIM_ID="VER04-C1"
          CLAIM_JOB="${{ github.job }}"
          CLAIM_COMMAND="mix test test/oban_powertools/forensics_test.exs test/oban_powertools/web/live/forensics_live_test.exs test/oban_powertools/web/live/audit_live_test.exs --seed 0"
          CLAIM_OUTPUT_FILE="$(mktemp)"
          mkdir -p tmp/ver04/claims tmp/ver04/logs
          ${CLAIM_COMMAND} 2>&1 | tee "${CLAIM_OUTPUT_FILE}"
          CLAIM_STATUS_CODE=${PIPESTATUS[0]}
          CLAIM_STATUS="success"
          if [ "${CLAIM_STATUS_CODE}" -ne 0 ]; then
            CLAIM_STATUS="failure"
          fi
          cat <<EOF > "tmp/ver04/claims/${CLAIM_ID}.json"
          {
            "claim_id": "${CLAIM_ID}",
            "job": "${CLAIM_JOB}",
            "command": "${CLAIM_COMMAND}",
            "status": "${CLAIM_STATUS}",
            "seed": 0
          }
          EOF
          if [ "${CLAIM_STATUS_CODE}" -ne 0 ]; then
            cat "${CLAIM_OUTPUT_FILE}" > "tmp/ver04/logs/${CLAIM_ID}.log"
          else
            printf "No failed command output captured for %s.\n" "${CLAIM_ID}" > "tmp/ver04/logs/${CLAIM_ID}.log"
          fi
          cat <<EOF > "tmp/ver04/run-metadata.json"
          {
            "github.run_id": "${{ github.run_id }}",
            "github.sha": "${{ github.sha }}",
            "workflow_file": ".github/workflows/host-contract-proof.yml",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "seed_policy": "deterministic --seed 0"
          }
          EOF
          exit "${CLAIM_STATUS_CODE}"
      - name: Upload VER04-C1 claim artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: continuity-ver04-c1-evidence
          if-no-files-found: error
          path: |
            tmp/ver04/claims/VER04-C1.json
            tmp/ver04/logs/VER04-C1.log
            tmp/ver04/run-metadata.json

