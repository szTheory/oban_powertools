          CLAIM_OUTPUT_FILE="$(mktemp)"
          mkdir -p tmp/ver04/claims tmp/ver04/logs
          bash -lc "${CLAIM_COMMAND}" 2>&1 | tee "${CLAIM_OUTPUT_FILE}"
          CLAIM_STATUS_CODE=${PIPESTATUS[0]}
          CLAIM_STATUS="success"
          if [ "${CLAIM_STATUS_CODE}" -ne 0 ]; then
            CLAIM_STATUS="failure"
